<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESIDENT EVIL 3: NEMESIS</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        #viewport-container {
            position: relative;
            width: 100vw;
            max-width: 177.78vh;
            height: 56.25vw;
            max-height: 100vh;
            background-color: #050505;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        #ejs-target {
            position: absolute;
            inset: 0;
            z-index: 10;
        }

        /* The Glass Overlay - Sits directly above the emulator */
        #glass-overlay {
            position: absolute;
            inset: 0;
            z-index: 40;
            display: none;
            cursor: crosshair;
        }

        #architect-title {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            background: #000;
            transition: opacity 1.5s ease-in-out;
        }

        #architect-title h1 {
            font-size: 2.5vw;
            letter-spacing: 0.5vw;
            font-weight: 300;
            color: rgba(200, 200, 200, 0.8);
            text-transform: uppercase;
            margin-bottom: 20px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
        }

        #data-stream-container {
            width: 40%;
            height: 2px;
            background: #222;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            display: none;
        }

        #data-stream-bar {
            position: absolute;
            top: 0; left: 0; height: 100%; width: 0%;
            background: #888;
            box-shadow: 0 0 10px #fff;
            transition: width 0.1s linear;
        }

        #boot-btn {
            padding: 10px 30px;
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        #boot-btn:hover {
            border-color: #fff;
            color: #fff;
        }

        /* MINIMAL HUD */
        #modern-hud {
            position: absolute;
            bottom: 30px;
            right: 40px;
            display: flex;
            gap: 20px;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .hud-element {
            display: flex;
            align-items: center;
        }

        .hud-key {
            background: transparent;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 700;
            font-size: 0.85rem;
            margin-right: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .hud-icon {
            width: 16px;
            height: 16px;
            fill: rgba(255, 255, 255, 0.8);
        }

        #controller-layer {
            position: absolute;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            display: none;
        }

        .btn {
            position: absolute; background-color: #fff; opacity: 0.3; color: #000;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; user-select: none; pointer-events: auto; border-radius: 50%;
        }
        .btn:active { opacity: 0.6; }
        .btn-shoulder { width: 8%; height: 12%; border-radius: 8px; top: 5%; }
        #L1 { left: 5%; } #R1 { right: 5%; }
        .cluster-dpad { position: absolute; bottom: 10%; left: 5%; width: 20%; aspect-ratio: 1; pointer-events: none; }
        .btn-dpad { width: 33%; height: 33%; border-radius: 4px; }
        #DPAD_UP { top: 0; left: 33.5%; } #DPAD_DOWN { bottom: 0; left: 33.5%; }
        #DPAD_LEFT { top: 33.5%; left: 0; } #DPAD_RIGHT { top: 33.5%; right: 0; }
        .cluster-action { position: absolute; bottom: 10%; right: 5%; width: 20%; aspect-ratio: 1; pointer-events: none; }
        .btn-action { width: 30%; height: 30%; }
        #TRIANGLE { top: 0; left: 35%; } #CROSS { bottom: 0; left: 35%; }
        #SQUARE { top: 35%; left: 0; } #CIRCLE { top: 35%; right: 0; }
        .cluster-center { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); width: 25%; height: 8%; display: flex; justify-content: space-between; pointer-events: none; }
        .btn-menu { position: relative; width: 45%; height: 100%; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="viewport-container">
        
        <div id="architect-title">
            <h1>RESIDENT EVIL 3: NEMESIS</h1>
            <button id="boot-btn">ENTER RACCOON CITY</button>
            <div id="data-stream-container">
                <div id="data-stream-bar"></div>
            </div>
            <div id="stream-text" style="margin-top:10px; font-size:0.8rem; color:#666; font-family: monospace; display:none;">ESTABLISHING CONNECTION...</div>
        </div>

        <div id="ejs-target"></div>
        
        <div id="glass-overlay"></div>

        <div id="modern-hud">
            <div class="hud-element">
                <div class="hud-key">TAB</div>
                <svg class="hud-icon" viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
            </div>
            <div class="hud-element">
                <div class="hud-key">E</div>
                <svg class="hud-icon" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>
            </div>
        </div>

        <div id="controller-layer">
            <div class="btn btn-shoulder" id="L1" data-btn="L1">L1</div>
            <div class="btn btn-shoulder" id="R1" data-btn="R1">R1</div>
            <div class="cluster-dpad">
                <div class="btn btn-dpad" id="DPAD_UP" data-btn="DPAD_UP">▲</div>
                <div class="btn btn-dpad" id="DPAD_DOWN" data-btn="DPAD_DOWN">▼</div>
                <div class="btn btn-dpad" id="DPAD_LEFT" data-btn="DPAD_LEFT">◄</div>
                <div class="btn btn-dpad" id="DPAD_RIGHT" data-btn="DPAD_RIGHT">►</div>
            </div>
            <div class="cluster-center">
                <div class="btn btn-menu" id="SELECT" data-btn="SELECT">SELECT</div>
                <div class="btn btn-menu" id="START" data-btn="START">START</div>
            </div>
            <div class="cluster-action">
                <div class="btn btn-action" id="TRIANGLE" data-btn="TRIANGLE">△</div>
                <div class="btn btn-action" id="SQUARE" data-btn="SQUARE">□</div>
                <div class="btn btn-action" id="CIRCLE" data-btn="CIRCLE">○</div>
                <div class="btn btn-action" id="CROSS" data-btn="CROSS">X</div>
            </div>
        </div>

    </div>

    <script>
        let db;
        const dbName = "ArchitectLedger_RE3";
        const storeName = "SaveStates";

        const initDB = new Promise((resolve, reject) => {
            const request = indexedDB.open(dbName, 1);
            request.onupgradeneeded = (e) => {
                let localDB = e.target.result;
                if (!localDB.objectStoreNames.contains(storeName)) localDB.createObjectStore(storeName, { keyPath: "id" });
            };
            request.onsuccess = (e) => { db = e.target.result; resolve(); };
            request.onerror = (e) => reject(e);
        });

        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const controllerLayer = document.getElementById('controller-layer');

        if (isTouchDevice) {
            controllerLayer.style.display = 'block';
            const buttons = document.querySelectorAll('.btn');
            const touchMap = {
                'DPAD_UP': { key: 'w', code: 'KeyW', keyCode: 87 },
                'DPAD_DOWN': { key: 's', code: 'KeyS', keyCode: 83 },
                'DPAD_LEFT': { key: 'a', code: 'KeyA', keyCode: 65 },
                'DPAD_RIGHT': { key: 'd', code: 'KeyD', keyCode: 68 },
                'CROSS': { key: 't', code: 'KeyT', keyCode: 84 },
                'CIRCLE': { key: 'x', code: 'KeyX', keyCode: 88 },
                'SQUARE': { key: 'Shift', code: 'ShiftLeft', keyCode: 16 },
                'TRIANGLE': { key: 'Tab', code: 'Tab', keyCode: 9 },
                'L1': { key: 'q', code: 'KeyQ', keyCode: 81 },
                'R1': { key: 'r', code: 'KeyR', keyCode: 82 },
                'START': { key: 'e', code: 'KeyE', keyCode: 69 },
                'SELECT': { key: ' ', code: 'Space', keyCode: 32 }
            };

            function dispatchTouch(id, type) {
                const map = touchMap[id];
                window.dispatchEvent(new KeyboardEvent(type, { key: map.key, code: map.code, keyCode: map.keyCode, bubbles: true }));
            }

            buttons.forEach(btn => {
                const id = btn.getAttribute('data-btn');
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); dispatchTouch(id, 'keydown'); }, { passive: false });
                btn.addEventListener('touchend', (e) => { e.preventDefault(); dispatchTouch(id, 'keyup'); }, { passive: false });
            });
        }

        const bootBtn = document.getElementById('boot-btn');
        const titleOverlay = document.getElementById('architect-title');
        const streamContainer = document.getElementById('data-stream-container');
        const streamBar = document.getElementById('data-stream-bar');
        const streamText = document.getElementById('stream-text');
        const modernHud = document.getElementById('modern-hud');
        const glassOverlay = document.getElementById('glass-overlay');

        window.addEventListener('contextmenu', e => e.preventDefault());

        bootBtn.addEventListener('click', async () => {
            bootBtn.style.display = 'none';
            streamContainer.style.display = 'block';
            streamText.style.display = 'block';

            await initDB;

            const totalChunks = 8;
            const chunkArray = [];
            const baseUrl = 'https://huggingface.co/datasets/camouflagechicken/RE3-Data-Core/resolve/main/Resident%20Evil%203%20-%20Nemesis%20(USA).chd.part';

            try {
                for (let i = 0; i < totalChunks; i++) {
                    streamText.innerText = `Siphoning Node ${i + 1} of ${totalChunks}...`;
                    const response = await fetch(baseUrl + i);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    chunkArray.push(await response.arrayBuffer());
                    streamBar.style.width = `${((i + 1) / totalChunks) * 100}%`;
                }

                streamText.innerText = `BUFFERING VRAM...`;
                const finalBlob = new Blob(chunkArray, { type: 'application/octet-stream' });
                const objectUrl = URL.createObjectURL(finalBlob);

                window.EJS_player = '#ejs-target';
                window.EJS_core = 'pcsx_rearmed'; 
                window.EJS_gameName = 'Resident Evil 3: Nemesis';
                
                // CORRECTED PC MATRIX (As requested)
                const pcMapping = { 
                    0: { value: 't' },         // Cross (Shoot)
                    1: { value: 'shift' },     // Square (Run)
                    2: { value: 'space' },     // Select (Pause)
                    3: { value: 'e' },         // Start (Inventory)
                    4: { value: 'w' },         // D-Pad Up (Forward)
                    5: { value: 's' },         // D-Pad Down (Back)
                    6: { value: 'a' },         // D-Pad Left (Turn Left)
                    7: { value: 'd' },         // D-Pad Right (Turn Right)
                    8: { value: 'x' },         // Circle (Cancel)
                    9: { value: 'tab' },       // Triangle (Map)
                    10: { value: 'q' },        // L1 (Switch Target)
                    11: { value: 'r' },        // R1 (Aim)
                    12: { value: '1' },        // L2
                    13: { value: '2' },        // R2
                    14: { value: '3' },        // L3
                    15: { value: '4' },        // R3
                    16: { value: 'escape' }    // Home/Menu
                };

                window.EJS_defaultControls = { 0: pcMapping, 1: pcMapping, 2: pcMapping, 3: pcMapping };
                window.EJS_Buttons = { playPause: false, restart: false, mute: false, settings: false, fullscreen: false, saveState: false, loadState: false, screenRecord: false, gamepad: false, cheat: false, volume: false, saveSavFiles: false, loadSavFiles: false, quickSave: false, quickLoad: false, screenshot: false, cacheManager: false };
                window.EJS_gameUrl = objectUrl; 
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
                window.EJS_color = '#000000';
                window.EJS_startOnLoaded = true;
                window.EJS_biosUrl = ''; 

                window.EJS_onSaveState = function(data) {
                    const tx = db.transaction(storeName, "readwrite");
                    const store = tx.objectStore(storeName);
                    store.put({ id: "slot1", stateData: data });
                };

                window.EJS_onLoadState = function() {
                    return new Promise((resolve) => {
                        const tx = db.transaction(storeName, "readonly");
                        const store = tx.objectStore(storeName);
                        const request = store.get("slot1");
                        request.onsuccess = (e) => {
                            if(e.target.result) resolve(e.target.result.stateData);
                            else resolve(null);
                        };
                    });
                };

                const script = document.createElement('script');
                script.src = 'https://cdn.emulatorjs.org/latest/data/loader.js';
                document.body.appendChild(script);

                window.EJS_onGameStart = function() {
                    setTimeout(() => {
                        titleOverlay.style.opacity = '0';
                        if (!isTouchDevice) {
                            modernHud.style.opacity = '1';
                            glassOverlay.style.display = 'block'; // Activate the Glass Overlay
                        }
                        setTimeout(() => titleOverlay.remove(), 1500);
                    }, 500);

                    // --- THE OVERSEER (GLASS METHOD) ---
                    const simulateKey = (key, code, keyCode, type) => {
                        const eventObj = { key: key, code: code, keyCode: keyCode, which: keyCode, bubbles: true, cancelable: true, composed: true };
                        window.dispatchEvent(new KeyboardEvent(type, eventObj));
                        
                        const iframe = document.querySelector('#ejs-target iframe');
                        if (iframe && iframe.contentWindow) {
                            iframe.contentWindow.dispatchEvent(new KeyboardEvent(type, eventObj));
                            const innerDoc = iframe.contentDocument || iframe.contentWindow.document;
                            if (innerDoc) {
                                innerDoc.dispatchEvent(new KeyboardEvent(type, eventObj));
                                const canvas = innerDoc.querySelector('canvas');
                                if (canvas) canvas.dispatchEvent(new KeyboardEvent(type, eventObj));
                            }
                        }
                    };

                    glassOverlay.addEventListener('mousedown', async (e) => {
                        if (document.pointerLockElement !== glassOverlay) {
                            try { await glassOverlay.requestPointerLock(); } catch (err) {}
                        } else {
                            if (e.button === 0) simulateKey('t', 'KeyT', 84, 'keydown'); // L-Click -> T (Shoot)
                            if (e.button === 2) simulateKey('r', 'KeyR', 82, 'keydown'); // R-Click -> R (Aim)
                        }
                    });

                    glassOverlay.addEventListener('mouseup', (e) => {
                        if (document.pointerLockElement === glassOverlay) {
                            if (e.button === 0) simulateKey('t', 'KeyT', 84, 'keyup');
                            if (e.button === 2) simulateKey('r', 'KeyR', 82, 'keyup');
                        }
                    });
                };

            } catch (error) {
                streamText.innerText = `CRITICAL ERROR: Siphon Failed`;
                streamBar.style.backgroundColor = '#ff0000';
            }
        });
    </script>
</body>
</html>
