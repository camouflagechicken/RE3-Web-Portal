<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESIDENT EVIL 3: NEMESIS</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        #viewport-container {
            position: relative;
            width: 100vw;
            max-width: 177.78vh;
            height: 56.25vw;
            max-height: 100vh;
            background-color: #050505;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        #ejs-target {
            position: absolute;
            inset: 0;
            z-index: 10;
        }

        #architect-title {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            background: #000;
            transition: opacity 1.5s ease-in-out;
        }

        #architect-title h1 {
            font-size: 2.5vw;
            letter-spacing: 0.5vw;
            font-weight: 300;
            color: rgba(200, 200, 200, 0.8);
            text-transform: uppercase;
            margin-bottom: 20px;
            text-align: center;
        }

        #data-stream-container {
            width: 40%;
            height: 2px;
            background: #222;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            display: none;
        }

        #data-stream-bar {
            position: absolute;
            top: 0; left: 0; height: 100%; width: 0%;
            background: #888;
            box-shadow: 0 0 10px #fff;
            transition: width 0.1s linear;
        }

        #boot-btn {
            padding: 10px 30px;
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        #boot-btn:hover {
            border-color: #fff;
            color: #fff;
        }

        #controls-btn {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #333;
            color: #888;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 1px;
            font-size: 0.8rem;
            margin-top: 15px;
            transition: all 0.3s;
        }

        #controls-btn:hover {
            border-color: #aaa;
            color: #fff;
        }

        #controls-modal {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #111;
            border: 1px solid #333;
            padding: 30px;
            border-radius: 5px;
            text-align: left;
            max-width: 400px;
            width: 80%;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .modal-content h2 { 
            margin-top: 0; 
            border-bottom: 1px solid #333; 
            padding-bottom: 10px; 
            text-align: center; 
            color: #ccc;
        }

        .modal-content ul { 
            list-style: none; 
            padding: 0; 
            line-height: 2; 
        }

        .modal-content li { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px solid #222; 
        }

        .key-badge { 
            background: #333; 
            padding: 2px 8px; 
            border-radius: 3px; 
            font-weight: bold; 
            color: #fff;
            font-size: 0.85em;
        }

        #close-modal-btn {
            margin-top: 20px; 
            width: 100%; 
            padding: 10px; 
            background: #222; 
            border: 1px solid #444; 
            color: #fff; 
            cursor: pointer;
            font-family: inherit;
            transition: background 0.3s;
        }

        #close-modal-btn:hover { 
            background: #444; 
        }

        #controller-layer {
            position: absolute;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            display: none;
        }

        .btn {
            position: absolute;
            background-color: #fff;
            opacity: 0.3;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            user-select: none;
            pointer-events: auto;
            border-radius: 50%;
        }
        
        .btn:active { opacity: 0.6; }

        .btn-shoulder { width: 8%; height: 12%; border-radius: 8px; top: 5%; }
        #L1 { left: 5%; } #R1 { right: 5%; }
        .cluster-dpad { position: absolute; bottom: 10%; left: 5%; width: 20%; aspect-ratio: 1; pointer-events: none; }
        .btn-dpad { width: 33%; height: 33%; border-radius: 4px; }
        #DPAD_UP { top: 0; left: 33.5%; } #DPAD_DOWN { bottom: 0; left: 33.5%; }
        #DPAD_LEFT { top: 33.5%; left: 0; } #DPAD_RIGHT { top: 33.5%; right: 0; }
        .cluster-action { position: absolute; bottom: 10%; right: 5%; width: 20%; aspect-ratio: 1; pointer-events: none; }
        .btn-action { width: 30%; height: 30%; }
        #TRIANGLE { top: 0; left: 35%; } #CROSS { bottom: 0; left: 35%; }
        #SQUARE { top: 35%; left: 0; } #CIRCLE { top: 35%; right: 0; }
        .cluster-center { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); width: 25%; height: 8%; display: flex; justify-content: space-between; pointer-events: none; }
        .btn-menu { position: relative; width: 45%; height: 100%; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="viewport-container">
        
        <div id="architect-title">
            <h1>RESIDENT EVIL 3: NEMESIS</h1>
            <button id="boot-btn">ENTER RACCOON CITY</button>
            <button id="controls-btn">VIEW CONTROLS</button>
            <div id="data-stream-container">
                <div id="data-stream-bar"></div>
            </div>
            <div id="stream-text" style="margin-top:10px; font-size:0.8rem; color:#666; display:none;">ESTABLISHING CONNECTION...</div>
        </div>

        <div id="controls-modal">
            <div class="modal-content">
                <h2>SYSTEM LEDGER</h2>
                <ul>
                    <li><span>Move</span> <span class="key-badge">W A S D</span></li>
                    <li><span>Aim</span> <span class="key-badge">R-Click (or R)</span></li>
                    <li><span>Shoot</span> <span class="key-badge">L-Click (or Space)</span></li>
                    <li><span>Run</span> <span class="key-badge">Shift</span></li>
                    <li><span>Inventory</span> <span class="key-badge">E</span></li>
                </ul>
                <button id="close-modal-btn">ACKNOWLEDGE</button>
            </div>
        </div>

        <div id="ejs-target"></div>

        <div id="controller-layer">
            <div class="btn btn-shoulder" id="L1" data-btn="L1">L1</div>
            <div class="btn btn-shoulder" id="R1" data-btn="R1">R1</div>
            <div class="cluster-dpad">
                <div class="btn btn-dpad" id="DPAD_UP" data-btn="DPAD_UP">▲</div>
                <div class="btn btn-dpad" id="DPAD_DOWN" data-btn="DPAD_DOWN">▼</div>
                <div class="btn btn-dpad" id="DPAD_LEFT" data-btn="DPAD_LEFT">◄</div>
                <div class="btn btn-dpad" id="DPAD_RIGHT" data-btn="DPAD_RIGHT">►</div>
            </div>
            <div class="cluster-center">
                <div class="btn btn-menu" id="SELECT" data-btn="SELECT">SELECT</div>
                <div class="btn btn-menu" id="START" data-btn="START">START</div>
            </div>
            <div class="cluster-action">
                <div class="btn btn-action" id="TRIANGLE" data-btn="TRIANGLE">△</div>
                <div class="btn btn-action" id="SQUARE" data-btn="SQUARE">□</div>
                <div class="btn btn-action" id="CIRCLE" data-btn="CIRCLE">○</div>
                <div class="btn btn-action" id="CROSS" data-btn="CROSS">X</div>
            </div>
        </div>

    </div>

    <script>
        let db;
        const dbName = "ArchitectLedger_RE3";
        const storeName = "SaveStates";

        const initDB = new Promise((resolve, reject) => {
            const request = indexedDB.open(dbName, 1);
            request.onupgradeneeded = (e) => {
                let localDB = e.target.result;
                if (!localDB.objectStoreNames.contains(storeName)) {
                    localDB.createObjectStore(storeName, { keyPath: "id" });
                }
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                console.log("[Ledger] Successfully mounted pre-flight.");
                resolve();
            };
            request.onerror = (e) => reject(e);
        });

        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const controllerLayer = document.getElementById('controller-layer');

        if (isTouchDevice) {
            controllerLayer.style.display = 'block';
            
            const buttons = document.querySelectorAll('.btn');
            // Perfectly aligned touch controls mapping to our new PC WASD setup
            const touchMap = {
                'DPAD_UP': { key: 'w', code: 'KeyW', keyCode: 87 },
                'DPAD_DOWN': { key: 's', code: 'KeyS', keyCode: 83 },
                'DPAD_LEFT': { key: 'a', code: 'KeyA', keyCode: 65 },
                'DPAD_RIGHT': { key: 'd', code: 'KeyD', keyCode: 68 },
                'CROSS': { key: ' ', code: 'Space', keyCode: 32 },
                'CIRCLE': { key: 'x', code: 'KeyX', keyCode: 88 },
                'SQUARE': { key: 'Shift', code: 'ShiftLeft', keyCode: 16 },
                'TRIANGLE': { key: 'c', code: 'KeyC', keyCode: 67 },
                'L1': { key: 'q', code: 'KeyQ', keyCode: 81 },
                'R1': { key: 'r', code: 'KeyR', keyCode: 82 },
                'START': { key: 'e', code: 'KeyE', keyCode: 69 },
                'SELECT': { key: 'Backspace', code: 'Backspace', keyCode: 8 }
            };

            function dispatchTouch(id, type) {
                const map = touchMap[id];
                window.dispatchEvent(new KeyboardEvent(type, { 
                    key: map.key, code: map.code, keyCode: map.keyCode, bubbles: true 
                }));
            }

            buttons.forEach(btn => {
                const id = btn.getAttribute('data-btn');
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); dispatchTouch(id, 'keydown'); }, { passive: false });
                btn.addEventListener('touchend', (e) => { e.preventDefault(); dispatchTouch(id, 'keyup'); }, { passive: false });
            });
        }

        const controlsBtn = document.getElementById('controls-btn');
        const controlsModal = document.getElementById('controls-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');

        controlsBtn.addEventListener('click', () => { controlsModal.style.display = 'flex'; });
        closeModalBtn.addEventListener('click', () => { controlsModal.style.display = 'none'; });

        const bootBtn = document.getElementById('boot-btn');
        const titleOverlay = document.getElementById('architect-title');
        const streamContainer = document.getElementById('data-stream-container');
        const streamBar = document.getElementById('data-stream-bar');
        const streamText = document.getElementById('stream-text');

        bootBtn.addEventListener('click', async () => {
            bootBtn.style.display = 'none';
            controlsBtn.style.display = 'none';
            streamContainer.style.display = 'block';
            streamText.style.display = 'block';

            await initDB;

            const totalChunks = 8;
            const chunkArray = [];
            const baseUrl = 'https://huggingface.co/datasets/camouflagechicken/RE3-Data-Core/resolve/main/Resident%20Evil%203%20-%20Nemesis%20(USA).chd.part';

            try {
                for (let i = 0; i < totalChunks; i++) {
                    streamText.innerText = `Siphoning Node ${i + 1} of ${totalChunks}...`;
                    const response = await fetch(baseUrl + i);
                    if (!response.ok) throw new Error(`HTTP ${response.status} on chunk part${i}`);
                    const buffer = await response.arrayBuffer();
                    chunkArray.push(buffer);
                    streamBar.style.width = `${((i + 1) / totalChunks) * 100}%`;
                }

                streamText.innerText = `FUSING CHUNKS IN VRAM...`;
                const finalBlob = new Blob(chunkArray, { type: 'application/octet-stream' });
                const objectUrl = URL.createObjectURL(finalBlob);

                streamText.innerText = `BUFFERING INTO ENGINE...`;
                
                window.EJS_player = '#ejs-target';
                window.EJS_core = 'pcsx_rearmed'; 
                window.EJS_gameName = 'Resident Evil 3: Nemesis';
                
                const pcMapping = { 
                    0: { value: 'space' },     // Cross (Action/Shoot)
                    1: { value: 'shift' },     // Square (Run)
                    2: { value: 'backspace' }, // Select
                    3: { value: 'e' },         // Start (Inventory)
                    4: { value: 'w' },         // D-Pad Up (Forward)
                    5: { value: 's' },         // D-Pad Down (Back)
                    6: { value: 'a' },         // D-Pad Left (Turn Left)
                    7: { value: 'd' },         // D-Pad Right (Turn Right)
                    8: { value: 'c' },         // Circle (Cancel)
                    9: { value: 'tab' },       // Triangle (Map)
                    10: { value: 'q' },        // L1 (Switch Target)
                    11: { value: 'r' },        // R1 (Aim)
                    12: { value: 'z' },        // L2
                    13: { value: 'f' },        // R2 (Aim at barrels)
                    14: { value: '5' },        // L3
                    15: { value: '6' },        // R3
                    16: { value: 'escape' }    // Home/Menu
                };

                window.EJS_defaultControls = { 0: pcMapping, 1: pcMapping, 2: pcMapping, 3: pcMapping };
                window.EJS_Buttons = { playPause: false, restart: false, mute: false, settings: false, fullscreen: false, saveState: false, loadState: false, screenRecord: false, gamepad: false, cheat: false, volume: false, saveSavFiles: false, loadSavFiles: false, quickSave: false, quickLoad: false, screenshot: false, cacheManager: false };
                window.EJS_gameUrl = objectUrl; 
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
                window.EJS_color = '#000000';
                window.EJS_startOnLoaded = true;
                window.EJS_biosUrl = ''; 

                window.EJS_onSaveState = function(data) {
                    const tx = db.transaction(storeName, "readwrite");
                    const store = tx.objectStore(storeName);
                    store.put({ id: "slot1", stateData: data });
                };

                window.EJS_onLoadState = function() {
                    return new Promise((resolve) => {
                        const tx = db.transaction(storeName, "readonly");
                        const store = tx.objectStore(storeName);
                        const request = store.get("slot1");
                        request.onsuccess = (e) => {
                            if(e.target.result) resolve(e.target.result.stateData);
                            else resolve(null);
                        };
                    });
                };

                const script = document.createElement('script');
                script.src = 'https://cdn.emulatorjs.org/latest/data/loader.js';
                document.body.appendChild(script);

                window.EJS_onGameStart = function() {
                    setTimeout(() => {
                        titleOverlay.style.opacity = '0';
                        setTimeout(() => titleOverlay.remove(), 1500);
                    }, 500);

                    // --- THE APEX OVERSEER SCRIPT ---

                    // 1. Absolute Kill Switch for Right-Click
                    window.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                    }, true); // 'true' forces it into the Capture Phase

                    // 2. Hardware Signal Injector
                    const injectHardwareSignal = (key, code, keyCode, type) => {
                        const event = new KeyboardEvent(type, { key: key, code: code, keyCode: keyCode, bubbles: true });
                        window.dispatchEvent(event);
                        const iframe = document.querySelector('#ejs-target iframe');
                        if (iframe && iframe.contentDocument) {
                            iframe.contentDocument.dispatchEvent(new KeyboardEvent(type, { key: key, code: code, keyCode: keyCode, bubbles: true }));
                        }
                    };

                    // 3. The Mouse Trap
                    window.addEventListener('mousedown', (e) => {
                        if (e.button === 0) { // Left Click -> Space (Action/Shoot)
                            e.preventDefault();
                            e.stopPropagation();
                            injectHardwareSignal(' ', 'Space', 32, 'keydown');
                        } else if (e.button === 2) { // Right Click -> R (Aim)
                            e.preventDefault();
                            e.stopPropagation();
                            injectHardwareSignal('r', 'KeyR', 82, 'keydown');
                        }
                    }, true);

                    window.addEventListener('mouseup', (e) => {
                        if (e.button === 0) {
                            e.preventDefault();
                            e.stopPropagation();
                            injectHardwareSignal(' ', 'Space', 32, 'keyup');
                        } else if (e.button === 2) {
                            e.preventDefault();
                            e.stopPropagation();
                            injectHardwareSignal('r', 'KeyR', 82, 'keyup');
                        }
                    }, true);
                };

            } catch (error) {
                streamText.innerText = `CRITICAL ERROR: Siphon Failed (${error.message})`;
                streamBar.style.backgroundColor = '#ff0000';
            }
        });
    </script>
</body>
</html>
